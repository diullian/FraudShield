services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fraudshield-sqlserver
    restart: always
    environment:
      SA_PASSWORD: "fraudshield@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fraudshield-rabbitmq
    restart: always
    ports:
      - "5672:5672" # conexão da aplicação
      - "15672:15672" # interface web de gerenciamento
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  mongodb:
    image: mongo:7
    container_name: fraudshield-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
  mongo-express:
    image: mongo-express:latest
    container_name: fraudshield-mongo-ui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
  redis:
    image: redis:alpine
    container_name: fraudshield-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
volumes:
  sqlserver_data:
  rabbitmq_data:
  mongo_data:
