services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fraudshield-sqlserver
    restart: always
    environment:
      SA_PASSWORD: "fraudshield@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'fraudshield@123' -Q 'SELECT 1' -No",
        ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fraudshield-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: fraudshield-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express:latest
    container_name: fraudshield-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: fraudshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  fraudshield-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraudshield-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=FraudShield;User Id=sa;Password=fraudshield@123;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  fraudshield-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fraudshield-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      MongoSettings__ConnectionString: "mongodb://admin:admin123@mongodb:27017"
      MongoSettings__DatabaseName: "fraudshield_audit"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  sqlserver_data:
  rabbitmq_data:
  mongo_data:
